<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Request a Quote - Craft Logistics Inc</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header>
    <div class="logo">
      <img src="images/logo.png" alt="Craft Logistics Logo" class="logo-img">
      Craft Logistics Inc
    </div>
    <nav>
      <ul>
        <li><a href="index.html">Home</a></li>
        <li><a href="services.html">Services</a></li>
        <li><a href="quote.html" class="active">Request a Quote</a></li>
      </ul>
    </nav>
  </header>

  <section class="quote-form">
    <div class="container">
      <h1>Request a Quote</h1>
      <p>Fill out the form below and our team will get back to you promptly.</p>
      <form action="https://usebasin.com/f/2ca71952ac1c" method="POST">
        <label for="name">Full Name:</label>
        <input type="text" id="name" name="name" required>

        <label for="email">Email Address:</label>
        <input type="email" id="email" name="email" required>

        <label for="phone">Phone Number:</label>
        <input type="tel" id="phone" name="phone">

        <label for="origin">Origin:</label>
        <input type="text" id="origin" name="origin" required>

        <label for="destination">Destination:</label>
        <input type="text" id="destination" name="destination" required>

        <label for="details">Shipment Details:</label>
        <textarea id="details" name="details" rows="5" required></textarea>

        <button type="submit" class="btn">Submit Request</button>
      </form>
    </div>
  </section>

  <footer>
    <p>📍 Craft Logistics Inc | Email: info@craftlogistics.com | Phone: +1-555-123-4567</p>
  </footer>
</body>
</html>
